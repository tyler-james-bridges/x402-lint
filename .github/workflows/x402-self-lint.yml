name: x402 Self-Lint

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 12 * * 1' # every Monday at noon UTC

jobs:
  self-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: start local server
        run: |
          node server.js &
          sleep 2

      - name: lint a known x402 endpoint
        run: |
          echo "linting ordiscan x402 endpoint..."
          curl -sf -X POST http://localhost:8402/api/lint \
            -H "Content-Type: application/json" \
            -d '{"url": "https://api.ordiscan.com/v1/inscription/0"}' | tee result.json | jq .

      - name: check grade
        run: |
          GRADE=$(jq -r .grade result.json)
          SCORE=$(jq -r .score result.json)
          echo "grade: $GRADE ($SCORE/100)"
          if [ "$GRADE" = "F" ]; then
            echo "endpoint failed lint — our linter may be broken"
            exit 1
          fi

      - name: health check a known endpoint
        run: |
          curl -sf -X POST http://localhost:8402/api/health \
            -H "Content-Type: application/json" \
            -d '{"url": "https://api.ordiscan.com/v1/inscription/0"}' | tee health.json | jq .
          X402=$(jq -r .x402 health.json)
          echo "x402: $X402"
          if [ "$X402" != "true" ]; then
            echo "health check failed to detect x402"
            exit 1
          fi
